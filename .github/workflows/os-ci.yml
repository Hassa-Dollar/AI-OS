# OS CI — universal checks identical for every profile/component (ADR-0006). OS-OWNED: profile.sh never
# copies or overwrites this file; bootstrap.sh seeds it. Product build/test lives in product-ci.yml.
name: os-ci
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  os:
    name: os
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with: { fetch-depth: 0 }
      - name: shellcheck (determinism layer)
        run: shellcheck --severity=warning scripts/*.sh bootstrap.sh .githooks/pre-push
      - name: scripts are executable (registry BUG-01)
        shell: bash
        run: |
          bad=$(git ls-files -s -- 'scripts/*.sh' bootstrap.sh .githooks/pre-push \
            | awk '$1!="100755" && $4!="scripts/_lib.sh" && $4!="scripts/ci-env.sh"{print $4}')
          [ -z "$bad" ] || { echo "::error::tracked scripts missing +x (mode != 100755):"; echo "$bad"; echo "fix: git update-index --chmod=+x <file>"; exit 1; }
      - name: scripts invoke siblings via bash (exec-bit independence, BUG-18)
        shell: bash
        run: |
          hits=$(grep -nE '(^[[:space:]]*|exec )"\$DIR/[A-Za-z._-]+\.sh"' scripts/*.sh || true)
          [ -z "$hits" ] || { echo "::error::run a sibling script via 'bash \"\$DIR/<x>.sh\"', not direct exec (mount strips the +x bit — BUG-18):"; echo "$hits"; exit 1; }
      - name: determinism-layer tests (bats)
        run: sudo apt-get update && sudo apt-get install -y bats sqlite3 && bash scripts/test.sh
      - name: component-isolation (one-way boundary, ADR-0002)
        shell: bash
        run: |
          rc=0; shopt -s nullglob
          for c in components/*/; do
            [ -d "${c}src" ] || continue
            if grep -RInE "['\"][^'\"]*\.\./[^'\"]*(scripts|architecture|prompts|agents|reviews|reports|components)/" "${c}src" 2>/dev/null; then
              echo "::error::${c} source climbs outside its directory (one-way rule, ADR-0002)"; rc=1
            fi
          done
          exit $rc
      - name: coherence (generated docs + graph + dead links + stubs — Step 4 / ADR-0018)
        shell: bash
        run: bash scripts/verify-coherence.sh
      - name: secret-scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
