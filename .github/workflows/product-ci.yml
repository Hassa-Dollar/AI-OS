# Product CI — OS-owned, generic over components (ADR-0013). Discovers every components/*/ that has a
# package.json, builds/tests each in a matrix, then a STABLE `product` gate aggregates the result so branch
# protection can require one check name regardless of how many components exist. OS-wide checks (shellcheck ·
# secret-scan · isolation) live in os-ci.yml and are not duplicated here.
name: product-ci
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  discover:
    name: discover
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.set.outputs.components }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: set
        shell: bash
        run: |
          shopt -s nullglob
          names=()
          for d in components/*/; do
            [ -f "${d}package.json" ] && names+=("$(basename "$d")")
          done
          if [ ${#names[@]} -eq 0 ]; then
            echo 'components=[]' >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${names[@]}" | jq -R . | jq -cs .)
            echo "components=$json" >> "$GITHUB_OUTPUT"
          fi
  build:
    name: build
    needs: discover
    if: ${{ needs.discover.outputs.components != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.discover.outputs.components) }}
    defaults:
      run:
        working-directory: components/${{ matrix.component }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: components/${{ matrix.component }}/package-lock.json
      - run: npm ci
      - name: dependency audit (SCA — runtime deps, high+)
        run: npm audit --omit=dev --audit-level=high
      - name: ci (lint · typecheck · test · coverage)
        run: npm run -s ci
  product:
    name: product
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: gate
        shell: bash
        run: |
          echo "build result: ${{ needs.build.result }}"
          if [ "${{ needs.build.result }}" = "failure" ]; then
            echo "::error::a component build failed"; exit 1
          fi
          echo "product gate ok (all components built, or none buildable yet)"
