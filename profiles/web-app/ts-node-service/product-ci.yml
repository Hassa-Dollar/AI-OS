# Product CI for a web-app/ts-node-service component (seam owned by this profile, ADR-0003/0006).
# profile.sh apply copies this to .github/workflows/product-ci.yml. OS-wide checks (shellcheck ·
# secret-scan · isolation) live in the OS-owned os-ci.yml and are not duplicated here.
# NOTE: working-directory assumes the component is named "service" — adjust / use a matrix per component.
name: product-ci
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  product:
    name: product
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: components/service
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: components/service/package-lock.json
      - run: npm ci
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: test
        run: npm test
      - name: coverage
        run: npm run coverage
