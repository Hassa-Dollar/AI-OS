# CI for a web-app/ts-node-service component (seam owned by this profile, ADR-0003).
# profile.sh apply copies this to .github/workflows/ci.yml. Component build/test run INSIDE the
# component (ADR-0002); the isolation guard + secret scan run at the repo root.
# NOTE: the working-directory below assumes the component is named "service" — adjust per component.
name: ci
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: components/service
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: components/service/package-lock.json
      - run: npm ci
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: test
        run: npm test
      - name: coverage
        run: npm run coverage
      - name: component-isolation (one-way boundary, ADR-0002)
        working-directory: .
        run: |
          if grep -RInE "['\"][^'\"]*\.\./[^'\"]*(scripts|architecture|prompts|agents|reviews|reports|components)/" components/service/src 2>/dev/null; then
            echo "::error::component source climbs outside its directory (one-way rule, ADR-0002)"; exit 1
          fi
      - name: secret-scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
